services:
  db:
    image: postgres:16-alpine
    container_name: pathomai-db
    environment:
      POSTGRES_DB: pathomai
      POSTGRES_USER: pathomai
      POSTGRES_PASSWORD: pathomai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pathomai -d pathomai']
      interval: 10s
      timeout: 5s
      retries: 5

  ai-agents:
    build:
      context: ./ai-agents-lite-main
    container_name: pathomai-ai-agents
    env_file:
      - ./.env
    ports:
      - '8001:8000'
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  main-app:
    build:
      context: ./pathomAI-main
    container_name: pathomai-main-app
    env_file:
      - ./.env
    volumes:
      - ./exports:/app/backend/storage/exports
      - ${HOST_BRIDGE_WINDOWS_ROOT:-/mnt/c/Users}:${HOST_MOUNT_WINDOWS_ROOT:-/host/windows}
      - ${HOST_BRIDGE_LINUX_ROOT:-/home}:${HOST_MOUNT_LINUX_ROOT:-/host/linux}
    depends_on:
      db:
        condition: service_healthy
      ai-agents:
        condition: service_healthy
    ports:
      - '8000:8000'
    restart: unless-stopped

volumes:
  postgres_data:
